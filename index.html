<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissors Game</title>
</head>
<body>
    <h1>Rock paper scissors Game</h1>
    <div class="choices">
        <div class="choice">
            <img src="./img/rock.jpg" alt="Rock" id="rock">
        </div>
        <div class="choice">
            <img src="./img/paper.png" alt="Paper" id="paper">
        </div>
        <div class="choice">
            <img src="./img/scissors.jpg" alt="Scissors" id="scissors">
        </div>
    </div>
</body>
</html>
